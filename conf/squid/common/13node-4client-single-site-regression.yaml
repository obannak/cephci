# Single site cluster with 13 Ceph & 4 Client nodes
# with daemons - 13 crash, 5 mon, 3 mgr, 3 rgw
# 5 nfs, 10 (+2 backup) osds and
# 1 alertmanager, node-exporter, prometheus, grafana

globals:
  - ceph-cluster:
      name: ceph
      node1:
        networks:
          - provider_net_cci_13
        role:
          - _admin
          - installer
          - crash
          - alertmanager
          - mon
      node2:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - mon
          - nfs
          - osd
        no-of-volumes: 4
        disk-size: 20
      node3:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - mon
          - nfs
          - osd
        no-of-volumes: 4
        disk-size: 20
      node4:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - rgw
          - mgr
          - osd
        no-of-volumes: 4
        disk-size: 20
      node5:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - nfs
          - osd
        no-of-volumes: 4
        disk-size: 20
      node6:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - nfs
          - osd
        no-of-volumes: 4
        disk-size: 20
      node7:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - node-exporter
          - mds
          - osd
        no-of-volumes: 4
        disk-size: 20
      node8:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - prometheus
          - mds
          - osd
        no-of-volumes: 4
        disk-size: 20
      node9:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - grafana
          - mds
          - osd
        no-of-volumes: 4
        disk-size: 20
      node10:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - rgw
          - mds
          - osd
        no-of-volumes: 4
        disk-size: 20
      node11:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - rgw
          - mds
          - osd
        no-of-volumes: 4
        disk-size: 20
      node12:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - mon
          - nfs
          - osd-bak
        no-of-volumes: 4
        disk-size: 20
      node13:
        networks:
          - provider_net_cci_13
        role:
          - crash
          - mon
          - mgr
          - osd-bak
        no-of-volumes: 4
        disk-size: 20
      node14:
        networks:
          - provider_net_cci_14
        role:
          - client
      node15:
        networks:
          - provider_net_cci_14
        role:
          - client
      node16:
        networks:
          - provider_net_cci_15
        role:
          - client
      node17:
        networks:
          - provider_net_cci_15
        role:
          - client
